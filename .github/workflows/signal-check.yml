name: Signal Check

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  signal-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run check
        env:
          BREVO_USER: ${{ secrets.BREVO_USER }}
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          BREVO_SENDER: ${{ secrets.BREVO_SENDER }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, smtplib, os
          from email.mime.text import MIMEText

          TARGET = "bc1qm7xn5vmgh9jwuyusykc4nynhtp68ynj4rru3d6"
          ENDPOINT = "https://mempool.space/api/address/" + TARGET + "/txs"
          STATE_FILE = "state.txt"

          BREVO_USER = os.environ["BREVO_USER"]
          BREVO_SMTP_KEY = os.environ["BREVO_SMTP_KEY"]
          BREVO_SENDER = os.environ["BREVO_SENDER"]
          ALERT_EMAIL = os.environ["ALERT_EMAIL"]

          def send_email(subject, body):
              msg = MIMEText(body)
              msg["Subject"] = subject
              msg["From"] = BREVO_SENDER
              msg["To"] = ALERT_EMAIL
              with smtplib.SMTP("smtp-relay.brevo.com", 587) as s:
                  s.starttls()
                  s.login(BREVO_USER, BREVO_SMTP_KEY)
                  s.sendmail(BREVO_SENDER, ALERT_EMAIL, msg.as_string())

          def to_btc(sats):
              return str(round(sats / 100000000, 8)) + " BTC"

          last_known = ""
          if os.path.exists(STATE_FILE):
              with open(STATE_FILE, "r") as f:
                  last_known = f.read().strip()

          req = urllib.request.Request(ENDPOINT, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req, timeout=15) as r:
              txs = json.loads(r.read().decode())

          if not txs:
              print("No transactions found.")
          else:
              latest = txs[0]
              latest_id = latest["txid"]

              if latest_id != last_known:
                  received = sum(
                      o["value"] for o in latest["vout"]
                      if o.get("scriptpubkey_address") == TARGET
                  )
                  confirmed = latest.get("status", {}).get("confirmed", False)
                  block = str(latest.get("status", {}).get("block_height", "pending"))
                  status = "Confirmed at block " + block if confirmed else "Pending (mempool)"

                  lines = [
                      "New transaction detected.",
                      "",
                      "Amount: " + to_btc(received) + " (" + str(received) + " sats)",
                      "Status: " + status,
                      "ID: " + latest_id,
                      "",
                      "Details:",
                      "https://mempool.space/tx/" + latest_id,
                      "",
                      "Overview:",
                      "https://mempool.space/address/" + TARGET,
                  ]
                  body = "\n".join(lines)
                  send_email("[ENTRY] New entry - " + to_btc(received), body)
                  print("NEW TX: " + latest_id + " - " + to_btc(received))

                  with open(STATE_FILE, "w") as f:
                      f.write(latest_id)
              else:
                  print("No changes - last known: " + last_known[:16] + "...")
          EOF

      - name: Save state
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@monitor"
          touch state.txt
          git add state.txt
          git diff --staged --quiet || git commit -m "chore: update state"
          git push || true
